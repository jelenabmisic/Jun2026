[extend]
useDefault = true # Keeps all standard rules (AWS, GitHub tokens, etc.) active

[[rules]]
id = "custom-generic-password"
description = "Detect generic passwords containing special characters"
regex = '''(?i)(?:password|passwd|pwd)\s*=\s*([a-zA-Z0-9!@#$%^&*()_\-+=\[\]{}|;:',.<>?/~`]{8,100})'''
secretGroup = 1
keywords = ["password", "passwd", "pwd"]
